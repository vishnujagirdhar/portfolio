<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vishnu | Graphic Designer</title>
  <meta name="description" content="Landing page for Vishnu, graphic designer.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Style.css">
</head>
<body>
  <div class="cursor-glow" aria-hidden="true"></div>
  <main class="page-shell">
    <section class="hero" aria-label="Vishnu landing page">
      <div class="hero-card">
        <div class="hero-tag" aria-label="About Me">
          <svg class="hero-tag__icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-4.418 0-8 1.79-8 4v2h16v-2c0-2.21-3.582-4-8-4Zm0-8a2 2 0 1 1-2 2 2 2 0 0 1 2-2Zm0 10c3.866 0 6 1.48 6 2v.002H6V17c0-.52 2.134-2 6-2Z"/>
          </svg>
          <span>About Me</span>
        </div>

        <a class="hero-meta" href="https://srivsnu.my.canva.site/edu-intern" target="_blank" rel="noopener noreferrer">Education &amp;<br>Internship</a>

        <div class="hero-copy">
          <p class="hero-kicker">Hi I'm</p>
          <h1 class="hero-title">Vishnu</h1>
          <p class="hero-role"><span class="dynamic-txt" aria-live="polite">GRAPHIC DESIGNER</span></p>

          <a class="hero-email" href="mailto:srivsnu@gmail.com">
            <span>srivsnu@gmail.com</span>
            <svg class="hero-email__icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2Zm0 2v.217l8 5.333 8-5.333V8H4Zm16 8V10.616l-7.445 4.964a1 1 0 0 1-1.11 0L4 10.616V16h16Z"/>
            </svg>
          </a>
          <span class="hero-email-line" aria-hidden="true"></span>
        </div>

        <div class="hero-visual" aria-hidden="true">
          <div class="portrait-ring">
            <div class="portrait-glow"></div>
            <img src="01img.png" alt="Vishnu portrait">
          </div>
        </div>

        <a class="hero-cta" href="https://srivsnu.my.canva.site/portfolio" target="_blank" rel="noopener noreferrer"><span class="hero-cta__label">Explore My designs</span></a>
      </div>
    </section>
  </main>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const text = document.querySelector(".dynamic-txt");
      const cursorGlow = document.querySelector(".cursor-glow");
      const finePointer = window.matchMedia("(hover: hover) and (pointer: fine)");

      if (!text) {
        return;
      }

      const textLoad = () => {
        setTimeout(() => {
          text.textContent = "GRAPHIC DESIGNER";
        }, 0);

        setTimeout(() => {
          text.textContent = "VIDEO EDITOR";
        }, 4000);

        setTimeout(() => {
          text.textContent = "UI/UX DESIGNER";
        }, 8000);
      };

      textLoad();
      setInterval(textLoad, 12000);

      if (cursorGlow && finePointer.matches) {
        const interactiveItems = document.querySelectorAll("a");

        document.addEventListener("pointermove", (event) => {
          cursorGlow.style.opacity = "1";
          cursorGlow.style.transform = `translate(${event.clientX}px, ${event.clientY}px)`;
        });

        document.addEventListener("pointerleave", () => {
          cursorGlow.style.opacity = "0";
        });

        interactiveItems.forEach((item) => {
          item.addEventListener("pointerenter", () => {
            cursorGlow.classList.add("is-link");
          });

          item.addEventListener("pointerleave", () => {
            cursorGlow.classList.remove("is-link");
          });
        });
      }
    });
  </script>
</body>
</html>
